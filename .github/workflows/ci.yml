name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [ecs, phpstan, rector]
    steps:
      - uses: actions/checkout@v5
      - name: Build PHP image
        run: docker compose build php
      - name: Start database
        run: docker compose up -d database
      - name: Wait for database
        run: |
          timeout 60 bash -c '
            until docker compose exec -T database pg_isready -U app -d app; do sleep 2; done
          '
      - name: Install dependencies
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php composer install --no-interaction --no-progress
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            ecs) docker compose run --rm --no-deps php vendor/bin/ecs check ;;
            phpstan) docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php bash -c "php bin/console cache:clear && vendor/bin/phpstan analyse --memory-limit=512M" ;;
            rector) docker compose run --rm --no-deps php vendor/bin/rector process --dry-run ;;
          esac

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - name: Build PHP image
        run: docker compose build php
      - name: Start database
        run: docker compose up -d database
      - name: Wait for database
        run: |
          timeout 60 bash -c '
            until docker compose exec -T database pg_isready -U app -d app; do sleep 2; done
          '
      - name: Install dependencies
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php composer install --no-interaction --no-progress
      - name: Create test database schema
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app_test?serverVersion=17" php php bin/console doctrine:schema:create --no-interaction
      - name: Unit tests
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php vendor/bin/phpunit --testsuite=unit
      - name: Integration tests
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php vendor/bin/phpunit --testsuite=integration
      - name: Functional tests
        run: docker compose run --rm -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17" php vendor/bin/phpunit --testsuite=functional
