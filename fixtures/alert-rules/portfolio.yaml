    (energy rationing, industrial collapse = high).
  urgency: medium
  severity_threshold: 6
  cooldown_minutes: 120
  categories: ["business", "politics"]
  enabled: true

# --- Portfolio-Specific Positions ---

- name: "K+S Specific Risk"
  type: ai
