---
# Production environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-prod
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}

  worker:
    image: ${IMAGES_PREFIX:-}app-php-prod
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=128M"]
    depends_on:
      - php

  enrichment-worker:
    image: ${IMAGES_PREFIX:-}app-php-prod
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
    command: ["php", "bin/console", "messenger:consume", "async_enrich", "--time-limit=3600", "--memory-limit=256M"]
    depends_on:
      - php

  fulltext-worker:
    image: ${IMAGES_PREFIX:-}app-php-prod
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
      FULL_TEXT_FETCH_ENABLED: "${FULL_TEXT_FETCH_ENABLED:-true}"
      FULL_TEXT_FETCH_TIMEOUT: "${FULL_TEXT_FETCH_TIMEOUT:-15}"
      FULL_TEXT_RATE_LIMIT_REQUESTS: "${FULL_TEXT_RATE_LIMIT_REQUESTS:-2}"
      FULL_TEXT_RATE_LIMIT_INTERVAL: "${FULL_TEXT_RATE_LIMIT_INTERVAL:-5}"
    command: ["php", "bin/console", "messenger:consume", "async_fulltext", "--time-limit=3600", "--memory-limit=128M"]
    depends_on:
      - php
